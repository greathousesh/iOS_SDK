name: MySDKBuild
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: 15.0
  xcodeVersion: 16.0

configs:
  Debug: debug
  Release: release

targets:
  MySDK:
    type: framework
    platform: iOS
    sources:
      - path: MySDK/Sources/MySDK
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.MySDK
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      SKIP_INSTALL: NO
      MACH_O_TYPE: mh_dylib
      GENERATE_INFOPLIST_FILE: YES

schemes:
  MySDK-Debug:
    shared: true # 显式标记为共享，确保在 Workspace 中可见
    build:
      targets:
        MySDK: all
    run:
      config: Debug
    archive:
      config: Debug

  MySDK-Release:
    shared: true # 显式标记为共享，确保在 Workspace 中可见
    build:
      targets:
        MySDK: all
    run:
      config: Release
    archive:
      config: Release
